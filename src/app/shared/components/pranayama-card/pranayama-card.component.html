<ion-card class="pranayama-card" (click)="toggleExpand()">
  <ion-card-header>
    <ion-card-title>{{ data.name }}</ion-card-title>
  </ion-card-header>

  <ion-card-content *ngIf="expanded">
    <p class="desc">{{ data.description }}</p>
    <h4>Benefits:</h4>
    <ul>
      <li *ngFor="let benefit of data.benefits">{{ benefit }}</li>
    </ul>
  </ion-card-content>
</ion-card>
