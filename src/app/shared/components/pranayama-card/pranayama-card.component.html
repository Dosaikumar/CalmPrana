<ion-card class="pranayama-card" (click)="toggleExpand()">
  <ion-card-header>
    <ion-card-title>{{ data.name }}</ion-card-title>
  </ion-card-header>

  <ion-card-content *ngIf="expanded">
    <p class="desc">{{ data.description }}</p>
    <h4>Benefits:</h4>
    <ul>
      <li *ngFor="let benefit of data.benefits">{{ benefit }}</li>
    </ul>

    <div class="audio-container" *ngIf="data.audioUrl">
      <audio controls controlsList="nodownload">
        <source [src]="data.audioUrl" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>
  </ion-card-content>
</ion-card>
